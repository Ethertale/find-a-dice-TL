<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="/css/navbar-footer.css">
    <title>Find A Dice - Chat Room</title>
    <style>
        :root {
            --panel-accent: #3c2b19;
            --gold: #d9b261;
            --gold-dark: #8f6a36;
            --muted-text: #cfc8b8;
            --light-text: #f7f3e7;
            --parchment-light: #f4e8d0;
            --parchment-dark: #d4c4a8;
            --header-bg: rgba(12, 9, 6, 0.92);
            --input-bar-bg: rgba(14, 11, 7, 0.95);
        }

        html {
            height: 100%;
        }

        body {
            min-height: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            font-family: "Georgia", "Palatino Linotype", serif;
            color: var(--muted-text);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                    linear-gradient(rgba(6,10,8,0.55), rgba(3,6,5,0.65)),
                    url("https://w0.peakpx.com/wallpaper/1014/828/HD-wallpaper-fantasy-of-after-world-war-4-fantasy-vintage-art-retro.jpg")
                    center center / cover no-repeat;
            filter: blur(10px);
            transform: scale(1.05);
        }

        .chat-page-container {
            height: calc(100vh - 60px);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        .participants-header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: var(--header-bg);
            border-bottom: 1px solid rgba(217, 178, 97, 0.2);
        }

        .participant-chip {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .participant-chip img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--gold-dark);
            object-fit: cover;
        }

        .participant-chip span {
            font-size: 0.85rem;
            color: var(--gold);
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .participant-divider {
            font-size: 0.7rem;
            color: var(--gold-dark);
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .chat-history {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px 16px;
        }

        .chat-history::-webkit-scrollbar { width: 6px; }
        .chat-history::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #5a4316, var(--gold-dark));
            border-radius: 4px;
        }
        .chat-history::-webkit-scrollbar-thumb:hover { background: var(--gold); }
        .chat-history::-webkit-scrollbar-track { background: transparent; }

        .chat-input-bar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: var(--input-bar-bg);
            border-top: 1px solid rgba(217, 178, 97, 0.15);
        }

        .chat-input-bar input {
            flex: 1;
            background: linear-gradient(180deg, #e8dcc4, #d9cdb5);
            border: 1px solid var(--panel-accent);
            border-radius: 20px;
            color: #2c2416;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .chat-input-bar input:focus {
            border-color: var(--gold-dark);
            box-shadow: 0 0 0 2px rgba(217, 178, 97, 0.2);
            background: linear-gradient(180deg, #f0e4cc, #e1d5bd);
        }

        .chat-input-bar input::placeholder {
            color: rgba(60, 50, 35, 0.45);
            font-style: italic;
        }

        /* Compact send button — inline, never full-width */
        .chat-input-bar .send-btn {
            flex-shrink: 0;
            background: linear-gradient(135deg, #5a4316, var(--gold));
            color: #111;
            border: none;
            border-radius: 20px;
            padding: 8px 18px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            white-space: nowrap;
        }

        .chat-input-bar .send-btn:hover {
            background: linear-gradient(135deg, #6a5320, #e9c571);
            transform: translateY(-1px);
        }

        .chat-input-bar .send-btn:active { transform: translateY(0); }

        /* Small connection status shown while WebSocket is initialising */
        #connection-status {
            font-size: 0.7rem;
            font-style: italic;
            color: var(--gold-dark);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .message-bubble {
            background: linear-gradient(135deg, #e8dcc4, #dfc596);
            border: 1px solid rgba(60, 43, 25, 0.5);
            border-radius: 14px;
            padding: 0.6rem 0.9rem;
            max-width: 65%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            word-wrap: break-word;
        }

        .message-bubble p {
            margin: 0 0 0.2rem 0;
            color: #2c1f0e;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .message-bubble p:last-child {
            font-size: 0.68rem;
            color: rgba(60, 43, 25, 0.55);
            font-style: italic;
            margin-bottom: 0;
        }

        .message-right {
            background: linear-gradient(135deg, #edd7a0, #c2a24e);
            border-color: rgba(143, 106, 54, 0.6);
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--gold-dark);
            object-fit: cover;
            flex-shrink: 0;
            align-self: flex-end;
        }

        .message-row {
            margin: 0.5rem 0;
            display: flex;
            align-items: flex-end;
            width: 100%;
        }

        .message-row.justify-content-end { flex-direction: row-reverse; }
        .message-row.justify-content-end .avatar { margin-left: 6px; }
        .message-row.justify-content-start .avatar { margin-right: 6px; }

        @media (max-width: 768px) {
            .chat-page-container { max-width: 100%; }
            .message-bubble { max-width: 78%; }
            .avatar { width: 32px; height: 32px; }
            .participant-chip span { font-size: 0.78rem; }
        }

        @media (max-width: 576px) {
            .message-bubble { max-width: 85%; }
            .chat-input-bar { padding: 8px 10px; gap: 6px; }
            .chat-input-bar .send-btn { padding: 8px 12px; font-size: 0.75rem; }
        }

        nav { z-index: 5; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #4a381f, #2b210c);
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.4);
        }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.15); }
    </style>
</head>
<body th:data-logged-hero-id="${loggedUser.hero.id}">

<nav th:replace="~{fragments::navbar}"></nav>

<div class="chat-page-container">

    <div class="participants-header">
        <div class="participant-chip">
            <img th:src="${chatRoom.participants.getFirst().imageUrl}" alt="">
            <span th:text="${chatRoom.participants.getFirst().name}"></span>
        </div>
        <span class="participant-divider">— vs —</span>
        <div class="participant-chip">
            <span th:text="${chatRoom.participants.getLast().name}"></span>
            <img th:src="${chatRoom.participants.getLast().imageUrl}" alt="">
        </div>
    </div>

    <div class="chat-history" id="chatHistory">
        <div id="chatMessages">

            <div th:each="message : ${chatRoom.getAllMessagesSortedBySentAt()}" class="col-12">

                <!-- Your messages — right aligned, golden bubble -->
                <div th:if="${message.sender.id == loggedUser.hero.id}"
                     class="message-row flex-row d-flex justify-content-end w-100">
                    <div class="message-bubble message-right">
                        <p th:text="${message.message}"></p>
                        <p th:text="${message.getTimeForSentMessage()}"></p>
                    </div>
                    <img th:src="${message.sender.imageUrl}" alt="You" class="avatar ms-2">
                </div>

                <!-- Their messages — left aligned, parchment bubble -->
                <div th:unless="${message.sender.id == loggedUser.hero.id}"
                     class="message-row d-flex justify-content-start">
                    <img th:src="${message.sender.imageUrl}" alt="Them" class="avatar me-2">
                    <div class="message-bubble message-left">
                        <p th:text="${message.message}"></p>
                        <p th:text="${message.getTimeForSentMessage()}"></p>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <div class="chat-input-bar">
        <span id="connection-status">Connecting...</span>
        <form id="messageForm"
              style="display:contents"
              th:object="${messageDTO}"
              th:method="POST"
              th:action="@{'/chat-room/' + ${chatRoom.roomCode} + '/create-message'}">
            <input id="message"
                   type="text"
                   th:field="*{message}"
                   placeholder="Inscribe your message upon the parchment..."
                   autocomplete="off"
                   maxlength="1500">
            <button type="submit" class="send-btn">Send</button>
        </form>
    </div>
</div>

<footer th:replace="~{fragments::footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js"
        integrity="sha384-RuyvpeZCxMJCqVUGFI0Do1mQrods/hhxYlcVfGPOfQtPJh0JCw12tUAZ/Mv10S7D"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script th:inline="javascript">
    // /*
    //  * th:inline="javascript" lets Thymeleaf inject server-side values
    //  * directly into this <script> block using the /*[[ ... ]]*/ syntax.
    // * This is how I pass roomCode and the logged user's hero ID from
    // * Java/Thymeleaf into JavaScript.
    // */
    const ROOM_CODE = /*[[${chatRoom.roomCode}]]*/ 'default-room';
    const LOGGED_HERO_ID = /*[[${loggedUser.hero.id}]]*/ 'unknown';
    const LOGGED_HERO_IMAGE = /*[[${loggedUser.hero.imageUrl}]]*/ '';

    // ---------------------------------------------------------------
    // STEP 1: Grab references to the DOM elements we'll be working with
    // ---------------------------------------------------------------
    const chatMessages = document.getElementById('chatMessages');
    const chatHistory = document.getElementById('chatHistory');
    const messageInput = document.getElementById('message');
    const messageForm = document.getElementById('messageForm');
    const statusLabel = document.getElementById('connection-status');

    // ---------------------------------------------------------------
    // STEP 2: Create the SockJS connection and the STOMP client
    //
    // Think of SockJS as the pipe (the phone line).
    // Think of STOMP as the language spoken over that pipe.
    // ---------------------------------------------------------------
    const socket = new SockJS('/ws');
    const stompClient = Stomp.over(socket);

    // Silence the STOMP debug logs in the browser console (optional, but cleaner)
    stompClient.debug = null;

    // ---------------------------------------------------------------
    // STEP 3: Connect!
    //
    // stompClient.connect() takes:
    //   - headers (empty object {} is fine, no special headers needed)
    //   - a callback function that runs once the connection is established
    // ---------------------------------------------------------------
    stompClient.connect({}, function (frame) {

        statusLabel.textContent = ''; // Clear the "Connecting..." message

        // -----------------------------------------------------------
        // STEP 4: Subscribe to this room's topic
        //
        // This is like "following" a channel. Whenever the server
        // broadcasts a message to /topic/chat/{roomCode}, this
        // callback function will be called with that message.
        // -----------------------------------------------------------
        stompClient.subscribe('/topic/chat/' + ROOM_CODE, function (stompMessage) {

            // stompMessage.body is a JSON string — we parse it into an object
            const msg = JSON.parse(stompMessage.body);

            // Now render the new message bubble into the DOM
            appendMessageBubble(msg);

            // Auto-scroll to the bottom so the new message is visible
            scrollToBottom();
        });

        // Scroll to the bottom on initial load so newest messages are visible
        scrollToBottom();

    }, function (error) {
        // This callback runs if the connection fails
        statusLabel.textContent = 'Could not connect to the tavern. Please refresh.';
        console.error('WebSocket connection error:', error);
    });

    // ---------------------------------------------------------------
    // STEP 5: Intercept the form submit
    //
    // Instead of letting the browser do a normal HTTP POST (which
    // would reload the page), we stop it and send via STOMP instead.
    // ---------------------------------------------------------------
    messageForm.addEventListener('submit', function (event) {
        event.preventDefault(); // ← This is the magic: stops the page reload

        const messageText = messageInput.value.trim();

        // Don't send empty messages
        if (!messageText) return;

        // Send the message to /app/chat/{roomCode}
        // Spring's @MessageMapping("/chat/{roomCode}") will pick this up
        stompClient.send(
            '/app/chat/' + ROOM_CODE,
            {}, // headers — empty is fine
            JSON.stringify({message: messageText}) // this becomes WsIncomingMessageDTO on the server
        );

        // Clear the input field immediately for a snappy feel
        messageInput.value = '';
        messageInput.focus();
    });

    // ---------------------------------------------------------------
    // STEP 6: The function that builds and inserts a message bubble
    //
    // This is pure JavaScript DOM manipulation — we create HTML elements
    // programmatically and attach them to the page. It mirrors what
    // Thymeleaf renders on page load, but done in real time.
    // ---------------------------------------------------------------
    function appendMessageBubble(msg) {
        // Is this message from the currently logged-in user?
        const isMe = msg.senderHeroId === String(LOGGED_HERO_ID);

        // Create the outer wrapper div (the "message-row")
        const rowDiv = document.createElement('div');
        rowDiv.classList.add('col-12');

        // Create the inner alignment div
        const alignDiv = document.createElement('div');
        alignDiv.classList.add('message-row', 'd-flex', 'w-100');
        alignDiv.classList.add(isMe ? 'justify-content-end' : 'justify-content-start');

        // Create the avatar image
        const avatar = document.createElement('img');
        avatar.src = msg.senderHeroImageUrl;
        avatar.alt = isMe ? 'Your Avatar' : 'Sender Avatar';
        avatar.classList.add('avatar');
        avatar.classList.add(isMe ? 'ms-2' : 'me-2');

        // Create the message bubble
        const bubble = document.createElement('div');
        bubble.classList.add('message-bubble');
        bubble.classList.add(isMe ? 'message-right' : 'message-left');

        // Create the message text paragraph
        const textP = document.createElement('p');
        textP.textContent = msg.message;

        // Create the timestamp paragraph
        const timeP = document.createElement('p');
        timeP.textContent = msg.sentAt;

        // Assemble the bubble
        bubble.appendChild(textP);
        bubble.appendChild(timeP);

        // For "my" messages: bubble first, then avatar (right-aligned layout)
        // For "other" messages: avatar first, then bubble (left-aligned layout)
        if (isMe) {
            alignDiv.appendChild(bubble);
            alignDiv.appendChild(avatar);
        } else {
            alignDiv.appendChild(avatar);
            alignDiv.appendChild(bubble);
        }

        rowDiv.appendChild(alignDiv);
        chatMessages.appendChild(rowDiv);
    }

    // ---------------------------------------------------------------
    // Helper: scroll the chat history container to the very bottom
    // ---------------------------------------------------------------
    function scrollToBottom() {
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }
</script>
</body>
</html>
