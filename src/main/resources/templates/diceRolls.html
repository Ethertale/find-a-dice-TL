<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="/css/navbar-footer.css">
    <title>Find A Dice - Dice Rolls</title>
    <style>
        /* ========== FANTASY THEME COLOR PALETTE ========== */
        :root {
            --gold: #d9b261;
            --gold-dark: #8f6a36;
            --muted-text: #cfc8b8;
            --light-text: #f7f3e7;
        }

        /* ========== BACKGROUND ========== */
        html, body {
            min-height: 100%;
            margin: 0;
            padding: 0;
            position: relative;
            font-family: "Georgia", "Palatino Linotype", serif;
            color: var(--muted-text);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(rgba(6, 10, 8, 0.55), rgba(3, 6, 5, 0.65)),
            url("/imgs/an-old-school-fantasy-art-of-a-desolate-_M34O8xdVQEq9mu1VmpR_Kw_oQcZ-_zMRSCtbabmahl8-g_sd.jpeg") center center / cover no-repeat;
            filter: blur(10px);
            transform: scale(1.05);
        }

        /* ========== MAIN CONTAINER ========== */
        .container {
            position: relative;
            z-index: 1;
        }

        /* ========== PAGE TITLE ========== */
        .dice-title {
            font-family: "Palatino Linotype", "Book Antiqua", serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--gold);
            text-align: center;
            letter-spacing: 2px;
            margin: 2rem 0 3rem 0;
            text-shadow: 0 2px 0 rgba(0, 0, 0, 0.8),
            0 4px 15px rgba(60, 43, 25, 0.6);
        }

        p {
            font-family: "Palatino Linotype", "Book Antiqua", serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--gold);
            text-align: center;
            letter-spacing: 2px;
            margin: 2rem 0 3rem 0;
            text-shadow: 0 2px 0 rgba(0, 0, 0, 0.8),
            0 4px 15px rgba(60, 43, 25, 0.6);
        }

        .dice-title::after {
            content: "";
            display: block;
            width: 40%;
            height: 2px;
            margin: 0.75rem auto 0 auto;
            background: linear-gradient(90deg,
            transparent 0%,
            var(--gold-dark) 50%,
            transparent 100%);
            opacity: 0.5;
        }

        .row div {
            margin-bottom: 20px;
        }

        .dices {
            width: 128px;
            aspect-ratio: 1/1;
            background: red;
            transition: 0.3s ease-in-out;
        }

        .dices:hover {
            transform: translateY(-8px) scale(1.05);
            filter: brightness(1.15);
        }

        .dices p {
            margin: 0;
            user-select: none;
        }

        #d4Con {
            clip-path: polygon(50% 0, 100% 100%, 0 100%);
            background: green;
        }
        #d4Con p {
            transform: translate(0%, 25%);
        }
        #d6Con {
            background: red;
        }
        #d8Con {
            clip-path: polygon(25% 5%, 75% 5%, 100% 50%, 75% 95%, 25% 95%, 0% 50%);
            background: yellow;
        }
        #d10Con {
            clip-path: polygon(50% 0, 100% 40%, 100% 60%, 50% 99%, 0 60%, 0 40%);
            background: hotpink;
        }
        #d12Con {
            clip-path: polygon(50% 0%, 83% 12%, 100% 43%, 94% 78%, 68% 100%, 32% 100%, 6% 78%, 0% 43%, 17% 12%);
            background: cornflowerblue;
        }
        #d20Con {
            transform: rotate(-90deg);
            clip-path: polygon(25% 5%, 75% 5%, 100% 50%, 75% 95%, 25% 95%, 0% 50%);
            background: white;
        }
        #d20Con p {
            transform: rotate(90deg);
        }
        #dPercCon {
            clip-path: polygon(50% 0, 100% 40%, 100% 60%, 50% 99%, 0 60%, 0 40%);
            background: brown;
        }

        .rolling {
            animation: rotate 1s ease-in-out;
        }

        @keyframes rotate {
            0% {
                transform: rotate(0deg) scale(1);
            }
            10% {
                transform: rotate(72deg) scale(0.9);
            }
            20% {
                transform: rotate(144deg) scale(0.8);
            }
            30% {
                transform: rotate(216deg) scale(0.9);
            }
            40% {
                transform: rotate(288deg) scale(1);
            }
            50% {
                transform: rotate(360deg) scale(1.1);
            }
            60% {
                transform: rotate(432deg) scale(1.2);
            }
            70% {
                transform: rotate(504deg) scale(1.1);
            }
            80% {
                transform: rotate(576deg) scale(1);
            }
            90% {
                transform: rotate(648deg) scale(0.9);
            }
            100% {
                transform: rotate(720deg) scale(1);
            }
        }

        /* ========== CUSTOM SCROLLBAR ========== */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #4a381f, #2b210c);
            border-radius: 10px;
            border: 2px solid rgba(0, 0, 0, 0.45);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #5a4825, #3a2815);
        }

        ::-webkit-scrollbar-track {
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.25));
        }

        @media (width < 768px) {
            .dice-title {
                font-size: 1.5rem;
                margin-bottom: 10px;
                margin-top: 0;
            }
        }
    </style>
</head>
<body>

<nav th:replace="~{fragments::navbar}"></nav>

<div class="container pt-5">
    <!-- Page Title -->
    <h1 class="dice-title">🎲 Roll the Dice 🎲</h1>

    <div class="row justify-content-center">
        <!-- D4 -->
        <div class="col-6 col-lg-5">
            <div id="d4Con" class="container dices d4 align-content-center text-center">
                <p id="d4Number">4</p>
            </div>
        </div>

        <!-- D6 -->
        <div class="col-6 col-lg-5">
            <div id="d6Con" class="container dices d6 align-content-center text-center">
                <p id="d6Number">6</p>
            </div>
        </div>

        <!-- D8 -->
        <div class="col-6 col-lg-4">
            <div id="d8Con" class="container dices d8 align-content-center text-center">
                <p id="d8Number">8</p>
            </div>
        </div>

        <!-- D10 -->
        <div class="col-6 col-lg-4">
            <div id="d10Con" class="container dices d10 align-content-center text-center">
                <p id="d10Number">10</p>
            </div>
        </div>

        <!-- D12 -->
        <div class="col-6 col-lg-4">
            <div id="d12Con" class="container dices d12 align-content-center text-center">
                <p id="d12Number">12</p>
            </div>
        </div>

        <!-- D20 -->
        <div class="col-6 col-lg-5">
            <div id="d20Con" class="container dices d20 align-content-center text-center">
                <p id="d20Number">20</p>
            </div>
        </div>

        <!-- D% -->
        <div class="col-6 col-lg-5">
            <div id="dPercCon" class="container dices dPercent align-content-center text-center">
                <p id="dPercNumber">%</p>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments::footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js"
        integrity="sha384-RuyvpeZCxMJCqVUGFI0Do1mQrods/hhxYlcVfGPOfQtPJh0JCw12tUAZ/Mv10S7D"
        crossorigin="anonymous"></script>

<script>
    function rollDice(diceEl, numberEl, maxValue, isPercentage = false) {
        diceEl.classList.add('rolling');
        numberEl.style.opacity = '0';
        setTimeout(() => {
            diceEl.classList.remove('rolling');
        }, 1000);
        setTimeout(() => {
            const result = Math.floor(Math.random() * maxValue) + 1;
            numberEl.textContent = isPercentage ? result + '%' : result.toString();
            numberEl.style.opacity = '1';
        }, 1000);
    }

    document.getElementById('d4Con').addEventListener('click', function () {
        let d4 = document.getElementById('d4Number');
        rollDice(this, d4, 4);
    })
    document.getElementById('d6Con').addEventListener('click', function () {
        let d6 = document.getElementById('d6Number');
        rollDice(this, d6, 6);
    })
    document.getElementById('d8Con').addEventListener('click', function () {
        let d8 = document.getElementById('d8Number');
        rollDice(this, d8, 8);
    })
    document.getElementById('d10Con').addEventListener('click', function () {
        let d10 = document.getElementById('d10Number');
        rollDice(this, d10, 10);
    })
    document.getElementById('d12Con').addEventListener('click', function () {
        let d12 = document.getElementById('d12Number');
        rollDice(this, d12, 12);
    })
    document.getElementById('d20Con').addEventListener('click', function () {
        let d20 = document.getElementById('d20Number');
        rollDice(this, d20, 20);
    })
    document.getElementById('dPercCon').addEventListener('click', function () {
        let dPerc = document.getElementById('dPercNumber');
        rollDice(this, dPerc, 100, true);
    })
</script>

</body>
</html>
