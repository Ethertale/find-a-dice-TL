<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="/css/navbar-footer.css">

    <!-- MedievalSharp font for dice numbers -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

    <title>Find A Dice - Dice Rolls</title>
    <style>
        /* ========== FANTASY THEME ========== */
        :root {
            --gold:          #d9b261;
            --gold-dark:     #8f6a36;
            --gold-mid:      #b8903a;
            --dice-face:     #3d2800;   /* dark brownish-yellow — the face of every die */
            --muted-text:    #cfc8b8;
            --light-text:    #f7f3e7;
        }

        html, body {
            min-height: 100%;
            margin: 0;
            padding: 0;
            position: relative;
            font-family: "Georgia", "Palatino Linotype", serif;
            color: var(--muted-text);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                    linear-gradient(rgba(6,10,8,0.55), rgba(3,6,5,0.65)),
                    url("/imgs/new-background.jpeg")
                    center center / cover no-repeat;
            filter: blur(10px);
            transform: scale(1.05);
        }

        .container {
            position: relative;
            z-index: 1;
        }

        /* ========== PAGE TITLE ========== */
        .dice-title {
            font-family: "Palatino Linotype", "Book Antiqua", serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--gold);
            text-align: center;
            letter-spacing: 2px;
            margin: 2rem 0 3rem 0;
            text-shadow:
                    0 2px 0 rgba(0,0,0,0.8),
                    0 4px 15px rgba(60, 43, 25, 0.6);
        }

        .dice-title::after {
            content: "";
            display: block;
            width: 40%;
            height: 2px;
            margin: 0.75rem auto 0 auto;
            background: linear-gradient(90deg,
            transparent 0%,
            var(--gold-dark) 50%,
            transparent 100%);
            opacity: 0.5;
        }

        .dices {
            width: 128px;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1.5rem auto;
            cursor: pointer;
            user-select: none;
            position: relative;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-mid) 50%, var(--gold-dark) 100%);
            filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.6))
            drop-shadow(0 0 10px rgba(217, 178, 97, 0.25));
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .dices::before {
            content: "";
            position: absolute;
            inset: 0;
            background: var(--dice-face);
            transform: scale(0.89);
            transform-origin: center center;
            z-index: 0;
        }

        .dices:hover {
            transform: translateY(-12px) scale(1.08);
            filter: drop-shadow(0 16px 32px rgba(0, 0, 0, 0.7))
            drop-shadow(0 0 18px rgba(217, 178, 97, 0.45));
        }

        .dices:active {
            transform: translateY(-6px) scale(1.04);
        }

        .dices p {
            margin: 0;
            font-family: 'MedievalSharp', serif;
            font-size: 2.4rem;
            color: var(--gold);
            text-shadow:
                    0 2px 4px rgba(0,0,0,0.9),
                    0 0 12px rgba(217, 178, 97, 0.4);
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
            line-height: 1;
        }

        .dices:hover p {
            color: var(--light-text);
            text-shadow:
                    0 2px 4px rgba(0,0,0,0.9),
                    0 0 16px rgba(255, 240, 200, 0.6);
        }

        #d4Con  { clip-path: polygon(50% 0, 100% 100%, 0 100%); }
        #d4Con::before { clip-path: polygon(50% 0, 100% 100%, 0 100%); }
        /* D4 number needs to drop toward the flat base of the triangle */
        #d4Con p { transform: translateY(20%); }

        #d6Con         { border-radius: 10px; }
        #d6Con::before { border-radius: 7px; }

        #d8Con  { clip-path: polygon(25% 5%, 75% 5%, 100% 50%, 75% 95%, 25% 95%, 0% 50%); }
        #d8Con::before { clip-path: polygon(25% 5%, 75% 5%, 100% 50%, 75% 95%, 25% 95%, 0% 50%); }

        #d10Con { clip-path: polygon(50% 0, 100% 40%, 100% 60%, 50% 99%, 0 60%, 0 40%); }
        #d10Con::before { clip-path: polygon(50% 0, 100% 40%, 100% 60%, 50% 99%, 0 60%, 0 40%); }

        #d12Con { clip-path: polygon(50% 0%, 83% 12%, 100% 43%, 94% 78%, 68% 100%, 32% 100%, 6% 78%, 0% 43%, 17% 12%); }
        #d12Con::before { clip-path: polygon(50% 0%, 83% 12%, 100% 43%, 94% 78%, 68% 100%, 32% 100%, 6% 78%, 0% 43%, 17% 12%); }

        #d20Con { clip-path: polygon(10% 30%, 50% 0, 90% 30%, 90% 70%, 50% 100%, 10% 70%); }
        #d20Con::before { clip-path: polygon(10% 30%, 50% 0, 90% 30%, 90% 70%, 50% 100%, 10% 70%); }

        #dPercCon { clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%); }
        #dPercCon::before { clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%); }

        /* ========== ROLLING ANIMATION ========== */
        .rolling {
            animation: diceRoll 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes diceRoll {
            0%   { transform: rotate(0deg)     scale(1);    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.6)) drop-shadow(0 0 10px rgba(217,178,97,0.25)); }
            8%   { transform: rotate(90deg)    scale(0.92); filter: drop-shadow(0 10px 24px rgba(0,0,0,0.6)) drop-shadow(0 0 12px rgba(217,178,97,0.35)); }
            16%  { transform: rotate(216deg)   scale(1.06); filter: drop-shadow(0 12px 28px rgba(0,0,0,0.6)) drop-shadow(0 0 16px rgba(217,178,97,0.45)); }
            24%  { transform: rotate(342deg)   scale(0.90); filter: drop-shadow(0 14px 32px rgba(0,0,0,0.6)) drop-shadow(0 0 20px rgba(217,178,97,0.55)); }
            32%  { transform: rotate(504deg)   scale(1.10); filter: drop-shadow(0 16px 36px rgba(0,0,0,0.6)) drop-shadow(0 0 22px rgba(217,178,97,0.60)); }
            40%  { transform: rotate(630deg)   scale(0.88); filter: drop-shadow(0 18px 40px rgba(0,0,0,0.6)) drop-shadow(0 0 24px rgba(217,178,97,0.60)); }
            48%  { transform: rotate(792deg)   scale(1.14); filter: drop-shadow(0 18px 40px rgba(0,0,0,0.6)) drop-shadow(0 0 24px rgba(217,178,97,0.60)); }
            56%  { transform: rotate(918deg)   scale(0.86); filter: drop-shadow(0 16px 36px rgba(0,0,0,0.6)) drop-shadow(0 0 20px rgba(217,178,97,0.50)); }
            64%  { transform: rotate(1044deg)  scale(1.12); filter: drop-shadow(0 14px 30px rgba(0,0,0,0.6)) drop-shadow(0 0 16px rgba(217,178,97,0.40)); }
            72%  { transform: rotate(1080deg)  scale(0.94); filter: drop-shadow(0 12px 26px rgba(0,0,0,0.6)) drop-shadow(0 0 12px rgba(217,178,97,0.30)); }
            80%  { transform: rotate(1080deg)  scale(1.06); filter: drop-shadow(0 10px 22px rgba(0,0,0,0.6)) drop-shadow(0 0 10px rgba(217,178,97,0.25)); }
            88%  { transform: rotate(1080deg)  scale(0.98); filter: drop-shadow(0 8px 20px rgba(0,0,0,0.6))  drop-shadow(0 0 10px rgba(217,178,97,0.25)); }
            100% { transform: rotate(1080deg)  scale(1);    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.6))  drop-shadow(0 0 10px rgba(217,178,97,0.25)); }
        }

        /* D20 starts rotated -90deg visually, so its roll starts there */
        #d20Con.rolling {
            animation: diceRollD20 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes diceRollD20 {
            0%   { transform: rotate(-90deg)  scale(1);    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.6)) drop-shadow(0 0 10px rgba(217,178,97,0.25)); }
            8%   { transform: rotate(0deg)    scale(0.92); filter: drop-shadow(0 10px 24px rgba(0,0,0,0.6)) drop-shadow(0 0 16px rgba(217,178,97,0.45)); }
            24%  { transform: rotate(252deg)  scale(0.90); filter: drop-shadow(0 16px 36px rgba(0,0,0,0.6)) drop-shadow(0 0 24px rgba(217,178,97,0.60)); }
            48%  { transform: rotate(702deg)  scale(1.14); filter: drop-shadow(0 18px 40px rgba(0,0,0,0.6)) drop-shadow(0 0 24px rgba(217,178,97,0.60)); }
            72%  { transform: rotate(990deg)  scale(0.94); filter: drop-shadow(0 12px 26px rgba(0,0,0,0.6)) drop-shadow(0 0 12px rgba(217,178,97,0.30)); }
            88%  { transform: rotate(1080deg) scale(0.98); filter: drop-shadow(0 8px 20px rgba(0,0,0,0.6))  drop-shadow(0 0 10px rgba(217,178,97,0.25)); }
            100% { transform: rotate(1080deg) scale(1);    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.6))  drop-shadow(0 0 10px rgba(217,178,97,0.25)); }
        }

        /* ========== NUMBER FADE ANIMATION ========== */
        .number-fade-out {
            animation: fadeOut 0.4s ease-out forwards;
        }

        .number-fade-in {
            animation: fadeIn 0.4s ease-in forwards;
        }

        @keyframes fadeOut {
            0%   { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.5); }
        }

        @keyframes fadeIn {
            0%   { opacity: 0; transform: scale(1.4); }
            60%  { opacity: 0.8; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ========== DICE LABELS ========== */
        .dice-label {
            text-align: center;
            font-family: 'MedievalSharp', serif;
            font-size: 0.85rem;
            color: var(--gold-dark);
            font-weight: 400;
            margin-top: 0.5rem;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            letter-spacing: 1px;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 992px) {
            .dices { width: 110px; }
            .dices p { font-size: 2.1rem; }
            .dice-title { font-size: 2rem; }
        }

        @media (max-width: 576px) {
            .dices { width: 96px; }
            .dices p { font-size: 1.9rem; }
            .dice-title { font-size: 1.75rem; margin: 1.5rem 0 2rem 0; }
        }

        /* ========== SCROLLBAR ========== */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #4a381f, #2b210c);
            border-radius: 10px;
            border: 2px solid rgba(0,0,0,0.45);
        }
        ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #5a4825, #3a2815); }
        ::-webkit-scrollbar-track { background: linear-gradient(180deg, rgba(0,0,0,0.15), rgba(0,0,0,0.25)); }

        nav { z-index: 5; }
    </style>
</head>
<body>

<nav th:replace="~{fragments::navbar}"></nav>

<div class="container pt-5">
    <h1 class="dice-title">Roll The Dice</h1>
    <div class="row justify-content-center">

        <!-- D4 -->
        <div class="col-6 col-lg-5">
            <div id="d4Con" class="container dices align-content-center text-center">
                <p id="d4Number">4</p>
            </div>
            <p class="dice-label">D4</p>
        </div>

        <!-- D6 -->
        <div class="col-6 col-lg-5">
            <div id="d6Con" class="container dices align-content-center text-center">
                <p id="d6Number">6</p>
            </div>
            <p class="dice-label">D6</p>
        </div>

        <!-- D8 -->
        <div class="col-6 col-lg-4">
            <div id="d8Con" class="container dices align-content-center text-center">
                <p id="d8Number">8</p>
            </div>
            <p class="dice-label">D8</p>
        </div>

        <!-- D10 -->
        <div class="col-6 col-lg-4">
            <div id="d10Con" class="container dices align-content-center text-center">
                <p id="d10Number">10</p>
            </div>
            <p class="dice-label">D10</p>
        </div>

        <!-- D12 -->
        <div class="col-6 col-lg-4">
            <div id="d12Con" class="container dices align-content-center text-center">
                <p id="d12Number">12</p>
            </div>
            <p class="dice-label">D12</p>
        </div>

        <!-- D20 -->
        <div class="col-6 col-lg-5">
            <div id="d20Con" class="container dices align-content-center text-center">
                <p id="d20Number">20</p>
            </div>
            <p class="dice-label">D20</p>
        </div>

        <!-- D% -->
        <div class="col-6 col-lg-5">
            <div id="dPercCon" class="container dices align-content-center text-center">
                <p id="dPercNumber">%</p>
            </div>
            <p class="dice-label">D%</p>
        </div>

    </div>
</div>

<footer th:replace="~{fragments::footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js"
        integrity="sha384-RuyvpeZCxMJCqVUGFI0Do1mQrods/hhxYlcVfGPOfQtPJh0JCw12tUAZ/Mv10S7D"
        crossorigin="anonymous"></script>

<script>
    function rollDice(diceEl, numberEl, maxValue, isPercentage = false) {
        diceEl.classList.add('rolling');

        numberEl.classList.add('number-fade-out');

        setTimeout(() => {
            diceEl.classList.remove('rolling');
        }, 1200);

        setTimeout(() => {
            const result = Math.floor(Math.random() * maxValue) + 1;
            numberEl.textContent = isPercentage ? result + '%' : result.toString();
            numberEl.classList.remove('number-fade-out');
            numberEl.classList.add('number-fade-in');
            setTimeout(() => numberEl.classList.remove('number-fade-in'), 400);
        }, 800);
    }

    document.getElementById('d4Con').addEventListener('click', function () {
        rollDice(this, document.getElementById('d4Number'), 4);
    });
    document.getElementById('d6Con').addEventListener('click', function () {
        rollDice(this, document.getElementById('d6Number'), 6);
    });
    document.getElementById('d8Con').addEventListener('click', function () {
        rollDice(this, document.getElementById('d8Number'), 8);
    });
    document.getElementById('d10Con').addEventListener('click', function () {
        rollDice(this, document.getElementById('d10Number'), 10);
    });
    document.getElementById('d12Con').addEventListener('click', function () {
        rollDice(this, document.getElementById('d12Number'), 12);
    });
    document.getElementById('d20Con').addEventListener('click', function () {
        rollDice(this, document.getElementById('d20Number'), 20);
    });
    document.getElementById('dPercCon').addEventListener('click', function () {
        rollDice(this, document.getElementById('dPercNumber'), 100, true);
    });
</script>

</body>
</html>
