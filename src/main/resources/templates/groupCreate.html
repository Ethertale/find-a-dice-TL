<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="/css/main.css">
    <title>Find A Dice - Create Group</title>
    <style>
        :root {
            --panel-accent: #3c2b19;
            --gold: #d9b261;
            --gold-dark: #8f6a36;
            --muted-text: #cfc8b8;
            --light-text: #f7f3e7;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            position: relative;
            font-family: "Georgia", "Palatino Linotype", serif;
            color: var(--muted-text);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                    linear-gradient(rgba(6,10,8,0.55), rgba(3,6,5,0.65)),
                    url("/imgs/new-background.jpeg")
                    center center / cover no-repeat;
            filter: blur(10px);
            transform: scale(1.05);
        }

        .container {
            position: relative;
            z-index: 1;
        }

        /* ========== FORM PANEL ========== */
        #backgr {
            background: linear-gradient(180deg,
            rgba(25, 20, 15, 0.95) 0%,
            rgba(18, 15, 12, 0.97) 100%);
            border: 4px solid var(--panel-accent);
            border-radius: 12px;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            box-shadow:
                    0 12px 40px rgba(0, 0, 0, 0.9),
                    inset 0 2px 0 rgba(255, 255, 255, 0.03),
                    inset 0 -20px 60px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        #backgr::before {
            content: "";
            position: absolute;
            inset: 12px;
            border: 2px solid rgba(217, 178, 97, 0.1);
            border-radius: 8px;
            pointer-events: none;
        }

        /* ========== LABELS ========== */
        label {
            color: var(--gold);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            margin-bottom: 0.4rem;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            display: block;
        }

        /* ========== INPUTS & TEXTAREA ========== */
        .form-control,
        textarea {
            width: 100%;
            border-radius: 8px;
            border: 2px solid rgba(60, 43, 25, 0.6);
            background: linear-gradient(180deg, rgba(14,12,10,0.7), rgba(8,6,5,0.8));
            color: var(--light-text);
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.7);
            padding: 0.7rem 0.95rem;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s ease;
            resize: vertical;
        }

        .form-control:focus,
        textarea:focus {
            background: linear-gradient(180deg, rgba(18,15,12,0.8), rgba(10,8,6,0.9));
            border-color: var(--gold-dark);
            box-shadow:
                    inset 0 3px 10px rgba(0,0,0,0.8),
                    0 0 0 3px rgba(217, 178, 97, 0.25),
                    0 0 20px rgba(217, 178, 97, 0.15);
            color: var(--light-text);
            outline: none;
        }

        .form-control::placeholder,
        textarea::placeholder {
            color: rgba(207, 200, 184, 0.4);
            font-style: italic;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        /* ========== SUBMIT BUTTON ========== */
        .btn-submit {
            background: linear-gradient(180deg, #5a4316, var(--gold));
            color: #111;
            border: 2px solid var(--gold-dark);
            box-shadow:
                    0 6px 16px rgba(0,0,0,0.7),
                    inset 0 2px 0 rgba(255,255,255,0.15);
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.05rem;
            padding: 0.75rem 3rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-submit::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-submit:hover::before { left: 100%; }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow:
                    0 10px 25px rgba(0,0,0,0.8),
                    0 0 30px rgba(217, 178, 97, 0.3);
            background: linear-gradient(180deg, #6a5320, #e9c571);
        }

        /* ========== BACK LINK ========== */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.4rem 0.6rem;
            border-radius: 6px;
            transition: all 0.3s ease;
            margin-bottom: 1.25rem;
        }

        .back-link:hover {
            background: rgba(217, 178, 97, 0.1);
            transform: translateX(-3px);
            color: var(--light-text);
        }

        .back-link img {
            filter: brightness(0) saturate(100%) invert(73%) sepia(31%) saturate(542%)
            hue-rotate(358deg) brightness(93%) contrast(86%);
            width: 18px;
        }

        /* ========== DECORATIVE CORNERS ========== */
        .corner {
            position: absolute;
            width: 36px;
            height: 36px;
            border: 3px solid var(--gold-dark);
            opacity: 0.35;
            pointer-events: none;
        }
        .corner.tl { top: 8px; left: 8px; border-right: none; border-bottom: none; }
        .corner.tr { top: 8px; right: 8px; border-left: none; border-bottom: none; }
        .corner.bl { bottom: 8px; left: 8px; border-right: none; border-top: none; }
        .corner.br { bottom: 8px; right: 8px; border-left: none; border-top: none; }

        /* ========== SCROLLBAR ========== */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #4a381f, #2b210c);
            border-radius: 10px;
            border: 2px solid rgba(0,0,0,0.45);
        }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }

        nav { z-index: 5; }
    </style>
</head>
<body>
<nav th:replace="~{fragments::navbar}"></nav>

<div style="min-height: 85vh; padding: 1.5rem 0;"
     class="container d-flex justify-content-center align-items-center">
    <div id="backgr">

        <!-- Decorative corners -->
        <span class="corner tl"></span>
        <span class="corner tr"></span>
        <span class="corner bl"></span>
        <span class="corner br"></span>

        <!-- Back link -->
        <a class="back-link" href="/groups">
            <img src="https://img.icons8.com/ios/50/left.png" alt="back"/>
            Back to Groups
        </a>

        <!-- Form title -->
        <h2 style="font-family: 'Palatino Linotype', serif; color: var(--gold);
                   font-size: 1.5rem; letter-spacing: 1.5px; text-transform: uppercase;
                   text-shadow: 0 2px 0 rgba(0,0,0,0.8); margin-bottom: 1.5rem; text-align: center;">
            Form a New Group
        </h2>

        <form th:method="POST"
              th:action="@{/groups/create-group/create}"
              th:object="${groupDTO}">

            <div class="form-group">
                <label for="groupName">Group Name</label>
                <input th:field="*{name}"
                       type="text"
                       class="form-control"
                       id="groupName"
                       placeholder="Name your group..."
                       required>
            </div>

            <div class="form-group">
                <label for="groupDescription">Description</label>
                <textarea th:field="*{description}"
                          id="groupDescription"
                          rows="5"
                          placeholder="What is this group about..."></textarea>
            </div>

            <div class="form-group">
                <label for="groupImageUrl">Cover Image URL</label>
                <input th:field="*{imageUrl}"
                       type="text"
                       class="form-control"
                       id="groupImageUrl"
                       placeholder="https://...">
            </div>

            <div class="d-flex justify-content-center mt-3">
                <button type="submit" class="btn-submit">Form Group</button>
            </div>

        </form>
    </div>
</div>

<footer th:replace="~{fragments::footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js"
        integrity="sha384-RuyvpeZCxMJCqVUGFI0Do1mQrods/hhxYlcVfGPOfQtPJh0JCw12tUAZ/Mv10S7D"
        crossorigin="anonymous"></script>
</body>
</html>
