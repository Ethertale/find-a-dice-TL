<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
<nav th:replace="~{fragments::navbar}"></nav>

<div class="container">
    <h1>Search Results for "<span th:text="${query}"></span>"</h1>

    <!-- Heroes Results -->
    <div th:if="${heroes.size() > 0}">
        <h2>Heroes</h2>
        <div th:each="hero : ${heroes}">
            <a th:href="@{'/profile/' + ${hero.user.id}}">
                <p th:text="${hero.name}"></p>
            </a>
        </div>
    </div>

    <!-- Users Results -->
    <div th:if="${users.size() > 0}">
        <h2>Heroes</h2>
        <div th:each="user : ${users}">
            <a th:href="@{'/profile/' + ${user.id}}">
                <p th:text="${user.username}"></p>
            </a>
        </div>
    </div>

    <!-- Events Results -->
    <div th:if="${events.size() > 0}">
        <h2>Events</h2>
        <div th:each="event : ${events}">
            <a th:href="@{'/events/' + ${event.id}}">
                <p th:text="${event.title}"></p>
            </a>
        </div>
    </div>

    <!-- Groups Results -->
    <div th:if="${groups.size() > 0}">
        <h2>Groups</h2>
        <div th:each="group : ${groups}">
            <a th:href="@{'/groups/' + ${group.id}}">
                <p th:text="${group.name}"></p>
            </a>
        </div>
    </div>

    <!-- No Results Message -->
    <div th:if="${heroes.isEmpty() && events.isEmpty() && groups.isEmpty() && users.isEmpty()}">
        <p>No results found for "<span th:text="${query}"></span>"</p>
    </div>
</div>

<footer th:replace="~{fragments::footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js"
        integrity="sha384-RuyvpeZCxMJCqVUGFI0Do1mQrods/hhxYlcVfGPOfQtPJh0JCw12tUAZ/Mv10S7D"
        crossorigin="anonymous"></script>
</body>
</html>
